<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <div class="py-5" style="background-image: url('{{ site.background_image2 }}'); background-size: cover; min-height: 95vh; padding-top: 6rem;">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card shadow-sm border-0">
              <div class="card-body p-4 p-md-5">
                <h1 class="h2 mb-4">{{ page.title | default: 'Contact' }}</h1>
                <p class="text-muted mb-4">{{ page.description | default: 'Tell us about your matter and we will get back to you shortly.' }}</p>
                <script src="https://formspree.io/js/formbutton-v1.min.js" defer></script>

                <form action="https://formspree.io/f/xrewlvyr" method="POST">
                  <div class="form-group">
                    <label>Name:<br>
                      <input type="name" name="name">
                    </label>
                  </div>

                  <div class="form-group">
                    <label>Company:<br>
                      <input type="company" name="company">
                    </label>
                  </div>
                  
                  <div class="form-group">
                    <label>Email:<br>
                      <input type="email" name="email">
                    </label>
                  </div>

                  <div class="form-group">
                    <label>Phone Number:<br>
                      <input type="phone" name="phone">
                    </label>
                  </div>

                  <div class="form-group">
                    <label>Message:<br>
                      <textarea name="message"></textarea>
                    </label>
                    
                  </div>

                  <button type="submit" class="btn btn-darker mt-3">Send</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    {%- include footer.html -%}

  </body>

</html>
