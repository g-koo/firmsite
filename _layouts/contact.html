<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <div class="py-5" style="background-image: url('{{ site.background_image2 }}'); background-size: cover; min-height: 95vh; padding-top: 6rem;">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card shadow-sm border-0">
              <div class="card-body p-4 p-md-5">
                <h1 class="h2 mb-4">{{ page.title | default: 'Contact' }}</h1>
                <p class="text-muted mb-4">{{ page.description | default: 'Tell us about your matter and we will get back to you shortly.' }}</p>

                <form action="{{ site.formspree_endpoint }}" method="POST">
                  <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                  </div>

                  <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" class="form-control" id="company" name="company">
                  </div>

                  <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                  </div>

                  <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phone">
                  </div>

                  <div class="form-group">
                    <label for="message">Message</label>
                    <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                  </div>

                  <button type="submit" class="btn btn-darker mt-3">Send Message</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    {%- include footer.html -%}

  </body>

</html>
