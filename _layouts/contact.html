<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <div class="py-5" style="background-image: url('{{ site.background_image2 }}'); background-size: cover; min-height: 95vh; padding-top: 6rem;">
      <div class="container py-5">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card shadow-sm border-0">
              <div class="card-body p-4 p-md-5">
                <h1 class="h2 mb-4">{{ page.title | default: 'Contact' }}</h1>
                <p class="text-muted mb-4">{{ page.description | default: 'Tell us about your matter and we will get back to you shortly.' }}</p>
                <script src="https://formspree.io/js/formbutton-v1.min.js" defer></script>
<script>
  /* paste this line in verbatim */
  window.formbutton=window.formbutton||function(){(formbutton.q=formbutton.q||[]).push(arguments)};
  /* customize formbutton below*/     
  formbutton("create", {
    action: "{{ site.formspree_endpoint }}",
    title: "How can we help?",
    fields: [
      { 
        type: "name", 
        label: "Name:", 
        name: "name",
        required: true,
        placeholder: "Your Name"
      },
      { 
        type: "company", 
        label: "Company:", 
        name: "company",
        placeholder: "Your Company"
      },
      { 
        type: "email", 
        label: "Email:", 
        name: "email",
        required: true,
        placeholder: "your@email.com"
      },
      {
        type: "textarea",
        label: "Message:",
        name: "message",
        required: true,
        placeholder: "How can we help?",
      },
      { type: "submit" }      
    ],

  });
</script>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    {%- include footer.html -%}

  </body>

</html>
