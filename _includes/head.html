<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {%- seo -%}
  {% if site.favicon_image %}
  <link rel="icon" href="{{ site.favicon_image | relative_url }}" type="image/png">
  <link rel="shortcut icon" href="{{ site.favicon_image | relative_url }}" type="image/png">
  {% endif %}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  <script src="{{ "{{site.url}}/assets/javascript/bootstrap/jquery.min.js" | relative_url }}"></script>
  <script src="{{ "{{site.url}}/assets/javascript/bootstrap/bootstrap.bundle.min.js" | relative_url }}"></script>
</head>
